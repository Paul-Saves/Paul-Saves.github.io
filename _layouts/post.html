---
layout: default
---
<div class="post">

  <header class="post-header mb-5">
    <h1 class="font-weight-bold">{{ page.title }}</h1>
    <p class="text-muted small">
      <i class="far fa-calendar-alt mr-1"></i> {{ page.date | date: "%B %-d, %Y" }}
      {% if page.author %} • <i class="fas fa-user mr-1"></i> {{ page.author }}{% endif %}
    </p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

  <hr class="mt-5">
  <div class="post-footer">
    <a href="{{ "/" | relative_url }}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-chevron-left mr-2"></i> Back to Home</a>
  </div>

</div>
